name: Deploy VinFlow to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          # PERBAIKAN: Pastikan semua flag berada SETELAH kata 'web'
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --web-renderer auto --no-tree-shake-icons

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages