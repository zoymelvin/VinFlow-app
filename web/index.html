<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="VinFlow - Personal Financial Tracker by Joy Melvin.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VinFlow</title>
  <link rel="manifest" href="manifest.json">
  
  </head>
<body style="overflow: hidden; position: fixed; width: 100%; height: 100%;">
  
  <script>
    // 1. Deteksi Perangkat Secara Agresif
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isMobile = /Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || isIOS;

    // 2. Konfigurasi Renderer
    window.flutterWebRenderer = isMobile ? "html" : "canvaskit";

    // 3. Panggil Loader Secara Manual agar konfigurasi kita tidak di-override
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine({
          renderer: window.flutterWebRenderer,
        }).then(function(appRunner) {
          appRunner.runApp();
        });
      }
    });
  </script>
</body>
</html>
